name: My First Workflow # ワークフローの名前

on: [push] # どのイベントで実行するか（今回はプッシュした時）

jobs:
  say-hello: # ジョブの名前
    runs-on: ubuntu-latest # 実行環境（最新のUbuntu Linux）
    
    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4 # 自分のコードを読み込むためのお決まりの処理

      - name: 挨拶を表示
        run: echo "Hello, GitHub Actions!" # 実行するコマンド

      - name: 日時を表示
        run: date
